name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 16
        run: |
          XCODE=$(find /Applications -maxdepth 1 -name "Xcode_16*.app" -type d 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            echo "Selecting $XCODE"
            sudo xcode-select -s "$XCODE/Contents/Developer"
          else
            echo "Xcode 16 not found, using default"
          fi
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: |
          xcrun simctl list devices available
          xcodebuild -showdestinations -scheme PersonalProgress -project PersonalProgress.xcodeproj 2>/dev/null || true

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project PersonalProgress.xcodeproj \
            -scheme PersonalProgress \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -configuration Debug \
            -derivedDataPath /tmp/DerivedData \
            -resultBundlePath /tmp/build.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/build.log | xcpretty || {
              echo "=== COMPILER ERRORS ==="
              grep -E "error:|note:" /tmp/build.log | head -80 || true
              exit 1
            }

      - name: Inspect built app metadata
        run: |
          APP_PATH=$(find /tmp/DerivedData -path "*/Build/Products/Debug-iphonesimulator/*.app" -maxdepth 8 -type d 2>/dev/null | head -1)
          echo "APP_PATH=$APP_PATH"
          if [ -n "$APP_PATH" ]; then
            echo "=== App Info.plist ==="
            plutil -p "$APP_PATH/Info.plist"
            if [ -d "$APP_PATH/PlugIns" ]; then
              echo "=== PlugIns ==="
              find "$APP_PATH/PlugIns" -name "*.appex" -maxdepth 1 | while read appex; do
                echo "---- $appex ----"
                plutil -p "$appex/Info.plist"
              done
            fi
          fi

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16 Pro" | grep -v "Max" | head -1 | grep -oE '[A-F0-9-]{36}')
          echo "iPhone 16 Pro UDID: $UDID"
          if [ -n "$UDID" ]; then
            xcrun simctl boot "$UDID" 2>&1 || true
            echo "Waiting for simulator to boot..."
            xcrun simctl bootstatus "$UDID" -b 2>&1 || sleep 15
          fi

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project PersonalProgress.xcodeproj \
            -scheme PersonalProgress \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -configuration Debug \
            -derivedDataPath /tmp/DerivedData \
            -resultBundlePath /tmp/test.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/test.log | xcpretty || {
              echo "=== SWIFT TESTING / XCTEST FAILURES (last 300 lines of raw log) ==="
              tail -300 /tmp/test.log || true
              exit 1
            }

      - name: Dump persistence mode from simulator logs
        if: failure()
        run: |
          echo "=== Persistence mode ==="
          grep -r "Persistence mode:" ~/Library/Logs/CoreSimulator/ 2>/dev/null | tail -20 || \
            grep -r "Persistence mode:" /tmp/test.log 2>/dev/null | tail -20 || \
            echo "(no persistence mode log found)"

      - name: Dump xcresult test failures
        if: failure()
        run: |
          BUNDLE=/tmp/test.xcresult
          if [ -d "$BUNDLE" ]; then
            echo "=== xcresult test failures ==="
            cat > /tmp/parse_xcresult.py << 'PYEOF'
import json, sys

def walk(obj):
    if isinstance(obj, dict):
        status = obj.get('testStatus', {})
        if isinstance(status, dict) and status.get('_value') == 'Failure':
            ident = obj.get('identifier', {})
            nm = obj.get('name', {})
            name = ident.get('_value', nm.get('_value', '?'))
            print('FAILED: ' + name)
            summaries = obj.get('failureSummaries', {}).get('_values', [])
            for s in summaries:
                msg = s.get('message', {}).get('_value', '')
                loc = s.get('sourceCodeContext', {}).get('location', {})
                fpath = loc.get('url', {}).get('_value', '')
                lineno = loc.get('lineNumber', {}).get('_value', '')
                print('  ' + msg + '  (' + fpath + ':' + str(lineno) + ')')
        for v in obj.values():
            walk(v)
    elif isinstance(obj, list):
        for v in obj:
            walk(v)

try:
    walk(json.load(sys.stdin))
except Exception as e:
    print('(parse error: ' + str(e) + ')')
PYEOF
            xcrun xcresulttool get --path "$BUNDLE" --format json 2>/dev/null \
              | python3 /tmp/parse_xcresult.py || echo "(xcresult parse failed)"
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: |
            /tmp/build.xcresult
            /tmp/test.xcresult
            /tmp/DerivedData/**/Logs/Test/
