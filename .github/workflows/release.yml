name: Release to TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number (leave blank to auto-increment)"
        required: false

jobs:
  release:
    name: Archive & Upload to TestFlight
    runs-on: macos-16

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26
        run: |
          XCODE=$(find /Applications -maxdepth 1 -name "Xcode_26*.app" -type d 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(find /Applications -maxdepth 1 -name "Xcode_16*.app" -type d 2>/dev/null | sort -V | tail -1)
          fi
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "$XCODE/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import distribution certificate
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > /tmp/distribution.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/PersonalProgress_AppStore.mobileprovision

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Set build number
        run: |
          BUILD="${{ github.event.inputs.build_number }}"
          if [ -z "$BUILD" ]; then
            BUILD="${{ github.run_number }}"
          fi
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV
          # Patch project.yml so xcodegen picks up the new build number
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: \"$BUILD\"/" project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project PersonalProgress.xcodeproj \
            -scheme PersonalProgress \
            -configuration Release \
            -archivePath /tmp/PersonalProgress.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="PersonalProgress AppStore" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            2>&1 | tee /tmp/archive.log | xcpretty || {
              echo "=== ARCHIVE ERRORS ==="
              grep -E "error:|note:" /tmp/archive.log | head -80 || true
              exit 1
            }

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.bigtimedee.PersonalProgress</key>
              <string>PersonalProgress AppStore</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/PersonalProgress.xcarchive \
            -exportPath /tmp/PersonalProgress-export \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(find /tmp/PersonalProgress-export -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}" \
            --verbose
